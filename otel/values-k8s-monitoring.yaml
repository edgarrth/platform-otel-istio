cluster:
  name: "local"

global:
  scrapeInterval: 60s
  scrapeTimeout: 10s

destinations:
  otlp-gateway:
    type: otlp
    protocol: http
    url: http://otel-collector.o11y.svc.cluster.local:4318
    logs:
      enabled: true
    metrics:
      enabled: true
    traces:
      enabled: true

    sendingQueue:
      enabled: true
      blockOnOverflow: true
      storage: otelcol.storage.file.otlp_gateway_queue_storage.handler
      batch:
        enabled: true
        flushTimeout: 1s
        sizer: items
        minSize: 100
        maxSize: 1000

#
# Features
#
clusterMetrics:
  enabled: true
  collector: alloy-metrics

hostMetrics:
  enabled: true
  collector: alloy-metrics
  linuxHosts:
    enabled: true
  windowsHosts:
    enabled: false

clusterEvents:
  enabled: true
  collector: alloy-metrics

nodeLogs:
  enabled: false

podLogsViaLoki:
  enabled: false

podLogsViaOpenTelemetry:
  enabled: true
  collector: alloy-logs

podLogsViaKubernetesApi:
  enabled: false

podLogsObjects:
  enabled: false

integrations:
  collector: alloy-metrics
  istio:
    instances:
      - name: istio
        # Ambient mode has no per-pod sidecars; only istiod metrics are scraped.
        sidecarMetrics:
          enabled: true
        istiodMetrics:
          enabled: true

applicationObservability:
  enabled: false

autoInstrumentation:
  enabled: false

annotationAutodiscovery:
  enabled: false

prometheusOperatorObjects:
  enabled: true
  collector: alloy-metrics

profiling:
  enabled: false

profilesReceiver:
  enabled: false

selfReporting:
  enabled: false

collectors:
  alloy-metrics:
    presets: [clustered, statefulset]
    alloy:
      stabilityLevel: experimental #public-preview
    extraConfig: |
      otelcol.storage.file "otlp_gateway_queue_storage" {
        create_directory = true
        directory = "/var/lib/otlp_gateway_queue_storage"
      }

  alloy-logs:
    presets: [filesystem-log-reader, daemonset]
    alloy:
      stabilityLevel: experimental #public-preview
    extraConfig: |
      otelcol.storage.file "otlp_gateway_queue_storage" {
        create_directory = true
        directory = "/var/lib/otlp_gateway_queue_storage"
      }

telemetryServices:
  kube-state-metrics:
    deploy: true

  opencost:
    deploy: false

  node-exporter:
    deploy: true

  windows-exporter:
    deploy: false